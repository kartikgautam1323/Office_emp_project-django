<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Management System</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <!-- Left: Brand -->
        <span class="navbar-brand mb-0 h1">Employee Management System</span>

        {% comment %} <!-- Right: Home Icon (Font Awesome) -->
        <a href="/" class="text-white text-decoration-none">
            <i class="fas fa-home fa-lg"></i>
        </a> {% endcomment %}
    </div>
</nav>


<div class="container mt-5">

    <div class="row g-4 justify-content-center">

        <!-- Add Employee -->
        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5 class="card-title">Add Employee</h5>
                    <p class="card-text">Create a new employee record</p>
                    <a href="/add_emp" class="btn btn-success w-100">Add</a>
                </div>
            </div>
        </div>

        <!-- View Employees -->
        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5 class="card-title">View Employees</h5>
                    <p class="card-text">See all employees</p>
                    <a href="/all_emp" class="btn btn-primary w-100">View All Employee</a>
                </div>
            </div>
        </div>

        <!-- Update Employee -->
        <div class="col-md-3">
    <div class="card shadow text-center border-warning" style="background-color: #fff9e6;"> <!-- Highlighted for Filter Employee -->
        <div class="card-body">
            <h5 class="card-title">Filter Employee</h5>
            <p class="card-text">Filter employee details</p>
            <a href="/filter_emp" class="btn btn-warning w-100 disabled" tabindex="-1" aria-disabled="true">
                Filter
            </a>
        </div>
    </div>
</div>


        <!-- Delete Employee -->
        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5 class="card-title">Delete Employee</h5>
                    <p class="card-text">Remove employee record</p>
                    <a href="/remove_emp" class="btn btn-danger w-100">Delete</a>
                </div>
            </div>
        </div>

    </div>
</div>


<hr>

<!-- Filter Form Card -->
<div class="container-fluid mt-5">
    <div class="card shadow-lg border-0 rounded-4 mx-auto" style="max-width: 1400px; width: 90%">
        <div class="card-body p-4">
            <form method="post" action="/filter_emp">
                {% csrf_token %} 
                <div class="row g-3">
                    <!-- Name Field -->
                    <div class="col-md-12">
                        <label class="form-label">First or Last Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter first or last name" value="{{name}}">
                    </div>

                    <!-- Department Field -->
                    <div class="col-md-6">
                        <label class="form-label">Department</label>
                        <select name="dept" class="form-select">
                            <option value="" selected>All Departments</option>
                            {% for dept in dep %}
                            <option value="{{ dept.name }}">{{ dept.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Role Field -->
                    <div class="col-md-6">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-select">
                            <option value="" selected>All Roles</option>
                            {% for role in rol %}
                            <option value="{{ role.name }}">{{ role.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mt-4 text-center">
                    <button type="submit" class="btn btn-warning btn-lg px-4">Filter Employees</button>
                </div>
            </form>
        </div>
    </div>
</div>

<a href="/"
   class="btn btn-dark position-fixed bottom-0 end-0 m-4 rounded-circle shadow d-flex align-items-center justify-content-center"
   style="width:55px; height:55px;">
    <i class="fas fa-home"></i>
</a>

</body>
</html>
